<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodrigues CRM | Móveis Planejados</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #592419; /* Marrom Rodrigues */
            --bg: #F2F2F2;      /* Off-white Rodrigues */
            --text: #222222;
            --surface: #ffffff;
            --border: #e2ddd6;
            --r: 12px;
            --sh: 0 4px 12px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; font-family: 'Ubuntu', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 2.5rem; border-radius: var(--r); width: 90%; max-width: 380px; text-align: center; box-shadow: var(--sh); }
        .login-card h2 { color: var(--primary); margin-bottom: 1.5rem; }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* Main Layout */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        header { background: white; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-box { width: 40px; height: 40px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 22px; }
        
        nav { background: white; padding: 10px 20px; display: flex; gap: 15px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .nav-btn { padding: 8px 20px; border: none; background: none; cursor: pointer; font-weight: 500; border-radius: 20px; color: var(--text); white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: white; }

        main { flex: 1; overflow-y: auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }

        .panel { background: white; border-radius: var(--r); padding: 20px; box-shadow: var(--sh); margin-bottom: 20px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: var(--r); border-left: 6px solid var(--primary); box-shadow: var(--sh); }
        .stat-card h3 { font-size: 1.8rem; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid var(--bg); opacity: 0.6; font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid var(--bg); }
        
        .btn-add { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(89, 36, 25, 0.3); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: var(--r); width: 100%; max-width: 500px; position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }

        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <div class="logo-box" style="margin: 0 auto 20px;">R</div>
            <h2>Rodrigues Móveis</h2>
            <input type="email" id="login-email" placeholder="E-mail" value="contatomoveisrodrigues@gmail.com">
            <input type="password" id="login-pass" placeholder="Senha" value="123">
            <button class="btn-login" onclick="handleLogin()">Acessar Sistema</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo-area">
                <div class="logo-box">R</div>
                <strong style="font-size: 1.3rem; color: var(--primary);">Rodrigues CRM</strong>
            </div>
            <button onclick="handleLogout()" style="background:none; border:1px solid #ccc; padding:6px 12px; border-radius:6px; cursor:pointer;">Sair</button>
        </header>

        <nav>
            <button class="nav-btn active" onclick="showView('dashboard', this)">Dashboard</button>
            <button class="nav-btn" onclick="showView('leads', this)">Gestão de Leads</button>
        </nav>

        <main>
            <div id="view-dashboard" class="view active">
                <div class="grid-stats" id="stats-summary">
                    <div class="stat-card"><h3>0</h3><p>Leads Ativos</p></div>
                    <div class="stat-card"><h3>R$ 0</h3><p>Pipeline Total</p></div>
                </div>
                <div class="charts-container">
                    <div class="panel"><h3>Vendas por Etapa</h3><canvas id="chartEtapas"></canvas></div>
                    <div class="panel"><h3>Volume Financeiro</h3><canvas id="chartFinanceiro"></canvas></div>
                </div>
            </div>

            <div id="view-leads" class="view">
                <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 25px;">
                    <h2>Leads em Negociação</h2>
                    <button class="btn-add" onclick="openModalLead()">+ Novo Lead</button>
                </div>
                <div class="panel" style="overflow-x: auto;">
                    <table id="table-leads">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Projeto</th>
                                <th>Etapa</th>
                                <th>Valor</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="list-leads"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-lead" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color: var(--primary);">Cadastrar Novo Projeto</h2>
            <form id="form-lead">
                <div class="form-group"><label>Nome do Cliente</label><input type="text" id="l-name" required></div>
                <div class="form-group"><label>WhatsApp</label><input type="text" id="l-phone" placeholder="Ex: 55999999999"></div>
                <div class="form-group"><label>Descrição do Móvel</label><input type="text" id="l-product" placeholder="Ex: Cozinha sob medida"></div>
                <div class="form-group"><label>Valor do Orçamento (R$)</label><input type="number" id="l-value" step="0.01"></div>
                <div class="form-group">
                    <label>Fase da Venda</label>
                    <select id="l-stage">
                        <option value="Prospecção">Prospecção</option>
                        <option value="Visita Técnica">Visita Técnica</option>
                        <option value="Orçamento">Orçamento</option>
                        <option value="Aguardando Contrato">Aguardando Contrato</option>
                        <option value="Fechado">Fechado</option>
                    </select>
                </div>
                <div style="display:flex; gap: 10px; margin-top: 25px;">
                    <button type="button" class="btn-login" style="background:#eee; color:#333;" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-login">Salvar no Sistema</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ4_iiknBGZX1ciwKtOfhfDPytsRqYW9A",
            authDomain: "crm-marcenaria-ac88a.firebaseapp.com",
            projectId: "crm-marcenaria-ac88a",
            storageBucket: "crm-marcenaria-ac88a.firebasestorage.app",
            messagingSenderId: "763443542872",
            appId: "1:763443542872:web:8046db5950bf66ddd1432d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let leads = [];
        let chartE, chartF;

        // AUTH
        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Acesso negado: Verifique e-mail e senha."));
        };
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                startRealtimeSync();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // SINCRONIZAÇÃO EM TEMPO REAL
        function startRealtimeSync() {
            const q = query(collection(db, "leads"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                leads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAll();
            }, (error) => {
                console.error("Erro na nuvem:", error);
                alert("Erro de conexão com o banco de dados.");
            });
        }

        // SALVAR NA NUVEM
        document.getElementById('form-lead').onsubmit = async (e) => {
            e.preventDefault();
            const newLead = {
                name: document.getElementById('l-name').value,
                phone: document.getElementById('l-phone').value,
                product: document.getElementById('l-product').value,
                value: parseFloat(document.getElementById('l-value').value) || 0,
                stage: document.getElementById('l-stage').value,
                date: new Date().toISOString()
            };
            try {
                await addDoc(collection(db, "leads"), newLead);
                closeModal();
            } catch (err) { alert("Erro ao salvar: " + err.message); }
        };

        window.deleteLead = async (id) => {
            if(confirm("Deseja excluir este lead permanentemente?")) {
                await deleteDoc(doc(db, "leads", id));
            }
        };

        function renderAll() {
            renderLeadsTable();
            renderStats();
            renderCharts();
        }

        function renderLeadsTable() {
            const tbody = document.getElementById('list-leads');
            tbody.innerHTML = leads.map(l => `
                <tr>
                    <td><strong>${l.name}</strong></td>
                    <td>${l.product}</td>
                    <td><span style="background:#f0e6e4; color:var(--primary); padding:5px 10px; border-radius:15px; font-size:0.85rem; font-weight:bold;">${l.stage}</span></td>
                    <td>R$ ${l.value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    <td>
                        <button onclick="window.open('https://wa.me/${l.phone}')" style="background:#25d366; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-right:5px;">Whats</button>
                        <button onclick="deleteLead('${l.id}')" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">X</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderStats() {
            const total = leads.reduce((acc, l) => acc + l.value, 0);
            document.getElementById('stats-summary').innerHTML = `
                <div class="stat-card"><h3>${leads.length}</h3><p>Leads Ativos</p></div>
                <div class="stat-card"><h3>R$ ${total.toLocaleString('pt-BR')}</h3><p>Pipeline Total</p></div>
            `;
        }

        function renderCharts() {
            const stages = ["Prospecção", "Visita Técnica", "Orçamento", "Aguardando Contrato", "Fechado"];
            const counts = stages.map(s => leads.filter(l => l.stage === s).length);
            const values = stages.map(s => leads.filter(l => l.stage === s).reduce((a,b) => a + b.value, 0));

            if(chartE) chartE.destroy();
            chartE = new Chart(document.getElementById('chartEtapas'), {
                type: 'doughnut',
                data: { labels: stages, datasets: [{ data: counts, backgroundColor: ['#8c5a4d', '#592419', '#d9c5b2', '#a67b5b', '#25d366'] }] },
                options: { plugins: { legend: { position: 'bottom' } } }
            });

            if(chartF) chartF.destroy();
            chartF = new Chart(document.getElementById('chartFinanceiro'), {
                type: 'bar',
                data: { labels: stages, datasets: [{ label: 'Valor (R$)', data: values, backgroundColor: '#592419' }] },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }

        window.showView = (id, btn) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            btn.classList.add('active');
        };
        window.openModalLead = () => { document.getElementById('form-lead').reset(); document.getElementById('modal-lead').style.display = 'flex'; };
        window.closeModal = () => document.getElementById('modal-lead').style.display = 'none';
    </script>
</body>
</html>
